services:
  - type: web
    name: tz-generator
    runtime: docker
    plan: free
    region: frankfurt
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "10000"
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: SUPERADMIN_PASSWORD
        sync: false
      - key: GIGACHAT_CREDENTIALS
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: YOOKASSA_SHOP_ID
        sync: false
      - key: YOOKASSA_SECRET_KEY
        sync: false
      - key: YOOKASSA_RETURN_URL
        sync: false
      - key: YOOKASSA_WEBHOOK_SECRET
        sync: false
      - key: CORS_ALLOW_ORIGINS
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: tz-generator-db
          property: connectionString
    autoDeploy: true

databases:
  - name: tz-generator-db
    plan: free
    databaseName: tzgenerator
    region: frankfurt
