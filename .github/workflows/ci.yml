name: tz-generator-ci

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend-react/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: JS tests
        run: make test

      - name: Backend smoke
        run: make backend-smoke

      - name: React build
        run: |
          cd frontend-react
          npm ci
          npm run build

      - name: Install Playwright
        run: |
          npm init -y > /dev/null 2>&1
          npm install playwright > /dev/null 2>&1
          npx playwright install --with-deps chromium

      - name: Playwright e2e (mock API)
        env:
          SKIP_PLAYWRIGHT_INSTALL: "1"
          SKIP_REACT_BUILD: "1"
        run: bash tests/run_e2e.sh
