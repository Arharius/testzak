services:
  - type: web
    name: tz-generator-backend
    runtime: docker
    dockerfilePath: backend/Dockerfile
    plan: free
    region: frankfurt
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "8000"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: tz-generator-db
          property: connectionString
      - key: CORS_ALLOW_ORIGINS
        value: https://tz-gen.vercel.app,https://tz-gen.ru
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: GIGACHAT_CREDENTIALS
        sync: false
      - key: SUPERADMIN_PASSWORD
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: FROM_EMAIL
        sync: false
      - key: SITE_URL
        value: https://tz-gen.vercel.app
      - key: YOOKASSA_SHOP_ID
        sync: false
      - key: YOOKASSA_SECRET_KEY
        sync: false
      - key: YOOKASSA_RETURN_URL
        sync: false
      - key: YOOKASSA_WEBHOOK_SECRET
        sync: false
      - key: GITHUB_TOKEN
        sync: false
    autoDeploy: true

databases:
  - name: tz-generator-db
    plan: free
    databaseName: tzgenerator
    region: frankfurt
