name: tz-generator-ci

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend deps
        run: pip install -r backend/requirements.txt

      - name: JS tests (autodetect + deep checks)
        run: make test

      - name: Backend smoke
        run: make backend-smoke

      - name: React build
        run: |
          cd frontend-react
          npm ci
          npm run build
