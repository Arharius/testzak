services:
  - type: web
    name: tz-generator
    runtime: docker
    plan: free
    region: frankfurt
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "10000"
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: SUPERADMIN_PASSWORD
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: tz-generator-db
          property: connectionString
    autoDeploy: true

databases:
  - name: tz-generator-db
    plan: free
    databaseName: tzgenerator
    region: frankfurt
